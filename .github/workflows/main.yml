name: Docker CI/CD

on:
 push:
   branches: [ "main" ]

jobs:
 build:
   runs-on: ubuntu-latest

   steps:
   - name: Checkout
     uses: actions/checkout@v2

   - name: Login to Docker Hub
     uses: docker/login-action@v2
     with:
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_PASSWORD }}

   - name: Build
     run: docker build -t shettypooja/webapp:latest .

   - name: Push
     run: docker push shettypooja/webapp:latest
